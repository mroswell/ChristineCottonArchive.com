<h1>Search the archive</h1>

<p>Full-text search across this site — reports, OCR text, captured pages,
interview titles, and the external-link catalog.</p>

<div id="pagefind-search" class="pagefind-host">
  <input type="search" id="pagefind-input"
    placeholder="Type a word, name, or phrase…"
    autocomplete="off" autofocus>
  <div id="pagefind-status" class="pagefind-status"></div>
  <div id="pagefind-results"></div>
</div>

<style>
  .pagefind-host { margin: 18px 0 40px; }
  #pagefind-input { width: 100%; padding: 12px 16px; font-size: 1.05rem;
    border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--ink); }
  #pagefind-input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47, 93, 124, .15); }
  .pagefind-status { color: var(--muted); font-size: .9rem; margin: 12px 0; }
</style>

<noscript><p>Search needs JavaScript. Browse the
  <a href="{{ '/en/archive/' | relative_url }}">Archive Index</a> instead.</p></noscript>

<script>
(function () {
  var input = document.getElementById('pagefind-input');
  var status = document.getElementById('pagefind-status');
  var results = document.getElementById('pagefind-results');
  status.textContent = 'Search index not yet built. Run Pagefind during deploy to populate this page.';

  // When the Pagefind bundle is present (built by the GH Actions workflow),
  // wire it up here. Until then this page is an intentional stub.
  if (window.PagefindUI) {
    new PagefindUI({ element: '#pagefind-search', showSubResults: true });
  }
})();
</script>
