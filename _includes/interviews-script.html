<script>
// The interview cards are now rendered at build time (see interview-cards.html),
// so the brief + cited-source text is in the static HTML and gets indexed by
// Pagefind. This script only FILTERS the existing cards by the search box.
const VLABELS = {{ include.labels | jsonify }};
const grid = document.getElementById("vgrid");
const cards = Array.from(grid.querySelectorAll(".vcard"));
const total = cards.length;
const vcountEl = document.getElementById("vcount");
const vemptyEl = document.getElementById("vempty");
const vsearchEl = document.getElementById("vsearch");

function applyFilter(){
  const q = vsearchEl.value.trim().toLowerCase();
  let shown = 0;
  for (const card of cards){
    const hay = card.getAttribute("data-search") || "";
    const match = !q || hay.includes(q);
    card.hidden = !match;
    if (match) shown++;
  }
  vemptyEl.hidden = shown > 0;
  vcountEl.textContent = VLABELS.count_template.replace("{n}", shown).replace("{total}", total);
}

vsearchEl.addEventListener("input", applyFilter);
applyFilter();
</script>
