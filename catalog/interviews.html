<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Christine Cotton — Interviews &amp; Video Appearances</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; background: #f7f8fa; color: #1b1f24; line-height: 1.5;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 64px; }
  header h1 { font-size: 1.7rem; margin: 0 0 6px; }
  header p { margin: 0 0 20px; color: #5a6471; }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 22px; }
  #search {
    flex: 1 1 260px; padding: 10px 14px; font-size: 1rem; border: 1px solid #ccd2da;
    border-radius: 8px; background: #fff; outline: none;
  }
  #search:focus { border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,.15); }
  #count { color: #5a6471; font-size: .9rem; white-space: nowrap; }
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    background: #fff; border: 1px solid #e3e7ec; border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #e8ebef; display: block; }
  .thumb.placeholder {
    display: flex; align-items: center; justify-content: center;
    color: #8a939e; font-size: .85rem; letter-spacing: .03em;
  }
  .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .title { font-weight: 600; font-size: 1rem; }
  .meta { font-size: .85rem; color: #5a6471; }
  .badge {
    display: inline-block; font-size: .72rem; font-weight: 600; padding: 2px 8px;
    border-radius: 999px; background: #edf2f7; color: #2b4a6b; align-self: flex-start;
  }
  .transcript { font-size: .8rem; color: #97a0ab; font-style: italic; }
  .watch {
    margin-top: auto; align-self: flex-start; text-decoration: none; font-weight: 600;
    font-size: .9rem; color: #fff; background: #2b6cb0; padding: 8px 14px; border-radius: 8px;
  }
  .watch:hover { background: #245a93; }
  .empty { color: #5a6471; padding: 30px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Christine Cotton — Interviews &amp; Video Appearances</h1>
    <p>French biostatistician who critiqued Pfizer's COVID-19 vaccine trials. A searchable catalog of her video appearances.</p>
  </header>
  <div class="controls">
    <input id="search" type="search" placeholder="Search by title, channel, or platform…" autocomplete="off">
    <span id="count"></span>
  </div>
  <div class="grid" id="grid"></div>
  <p class="empty" id="empty" hidden>No matching videos.</p>
</div>
<script>
const videos = [
  {id:"WmDFTibK-Ek", platform:"YouTube", title:"Le désastre sanitaire ne fait que commencer I Christine Cotton", author:"Cercle Aristote - Pierre Yves Rougeyron", url:"https://www.youtube.com/watch?v=WmDFTibK-Ek", thumb:"https://img.youtube.com/vi/WmDFTibK-Ek/hqdefault.jpg"},
  {id:"MJksTpVRQuA", platform:"YouTube", title:"Covid : où en sont les chiffres en 2023 ?", author:"Sud Radio", url:"https://www.youtube.com/watch?v=MJksTpVRQuA", thumb:"https://img.youtube.com/vi/MJksTpVRQuA/hqdefault.jpg"},
  {id:"JjLTt5_BGAE", platform:"YouTube", title:"La vérité sur les essais Pfizer - Le Zoom - Christine Cotton - TVL", author:"Chaîne officielle TVL", url:"https://www.youtube.com/watch?v=JjLTt5_BGAE", thumb:"https://img.youtube.com/vi/JjLTt5_BGAE/hqdefault.jpg"},
  {id:"ASXFLQdQXyU", platform:"YouTube", title:"Christine Cotton : « On a des risques qui sont parfaitement documentés ! » #COVID19", author:"LES INCORRECTIBLES", url:"https://www.youtube.com/watch?v=ASXFLQdQXyU", thumb:"https://img.youtube.com/vi/ASXFLQdQXyU/hqdefault.jpg"},
  {id:"prH1pkJrWhg", platform:"YouTube", title:"Covid19 - Christine Cotton : \"La science ce n'est pas de la politique, c'est de la statistique !\"", author:"Sud Radio", url:"https://www.youtube.com/watch?v=prH1pkJrWhg", thumb:"https://img.youtube.com/vi/prH1pkJrWhg/hqdefault.jpg"},
  {id:"iecQwlo5AhM", platform:"YouTube", title:"« J'ai découvert la face cachée de l'industrie pharmaceutique » – Christine Cotton", author:"Epoch Times France", url:"https://www.youtube.com/watch?v=iecQwlo5AhM", thumb:"https://img.youtube.com/vi/iecQwlo5AhM/hqdefault.jpg"},
  {id:"O8S7BSrRj3U", platform:"YouTube", title:"Pfizer : scandaleuses révélations sur l'essai clinique", author:"Décoder l'éco", url:"https://www.youtube.com/watch?v=O8S7BSrRj3U", thumb:"https://img.youtube.com/vi/O8S7BSrRj3U/hqdefault.jpg"},
  {id:"TQQVmdTXY-k", platform:"YouTube", title:"Christine Cotton - Biostatisticienne - Lanceuse d'alerte", author:"Elo Veut Savoir", url:"https://www.youtube.com/watch?v=TQQVmdTXY-k", thumb:"https://img.youtube.com/vi/TQQVmdTXY-k/hqdefault.jpg"},
  {id:"6D-LjaD99ys", platform:"YouTube", title:"REVAV AG Intervention de Christine Cotton Biostatisticienne octobre 2022", author:"Guillaume Ageorges", url:"https://www.youtube.com/watch?v=6D-LjaD99ys", thumb:"https://img.youtube.com/vi/6D-LjaD99ys/hqdefault.jpg"},
  {id:"Jn-2b0fUsrk", platform:"YouTube", title:"[DEBRIEF] La biostatisticienne Christine Cotton sur l'efficacité du vaccin anti-COVID Pfizer", author:"Michèle Rivasi", url:"https://www.youtube.com/watch?v=Jn-2b0fUsrk", thumb:"https://img.youtube.com/vi/Jn-2b0fUsrk/hqdefault.jpg"},
  {id:"sli4nYArz9k", platform:"YouTube", title:"Christine Cotton révèle le scandale des vaccins anticovid !", author:"Nicolas Dupont-Aignan", url:"https://www.youtube.com/watch?v=sli4nYArz9k", thumb:"https://img.youtube.com/vi/sli4nYArz9k/hqdefault.jpg"},
  {id:"KwUr6wqeVT0", platform:"YouTube", title:"COVID : les vérités cachées de la politique vaccinale - Christine Cotton", author:"Ligne Droite • La matinale de Radio Courtoisie", url:"https://www.youtube.com/watch?v=KwUr6wqeVT0", thumb:"https://img.youtube.com/vi/KwUr6wqeVT0/hqdefault.jpg"},
  {id:"LIPps6b8LgE", platform:"YouTube", title:"Actualité de la semaine et invitée exceptionnelle, la biostatisticienne Christine COTTON", author:"Ensemble Pour Les Libertés", url:"https://www.youtube.com/watch?v=LIPps6b8LgE", thumb:"https://img.youtube.com/vi/LIPps6b8LgE/hqdefault.jpg"},
  {id:"j2RnxnY6QL8", platform:"YouTube", title:"\"La Commission veut prolonger ce pass sans base scientifique !\" Virginie Joron, Christine Cotton", author:"Ligne Droite • La matinale de Radio Courtoisie", url:"https://www.youtube.com/watch?v=j2RnxnY6QL8", thumb:"https://img.youtube.com/vi/j2RnxnY6QL8/hqdefault.jpg"},
  {id:"snXhb5p5uTY", platform:"YouTube", title:"Autorisation du vaccin COVID : erreurs ou complicités ?", author:"Virginie Joron", url:"https://www.youtube.com/watch?v=snXhb5p5uTY", thumb:"https://img.youtube.com/vi/snXhb5p5uTY/hqdefault.jpg"},
  {id:"D69Q58E0rMM", platform:"YouTube", title:"CeNC - Commission d'enquête nationale citoyenne - bio-statisticienne Christine Cotton témoigne", author:"Actualité Politique Du Québec", url:"https://www.youtube.com/watch?v=D69Q58E0rMM", thumb:"https://img.youtube.com/vi/D69Q58E0rMM/hqdefault.jpg"},
  {id:"x887fvm", platform:"Dailymotion", title:"Les essais cliniques de Pfizer sont-ils frauduleux ? Avec Christine Cotton", author:"Sud Radio", url:"https://www.dailymotion.com/video/x887fvm", thumb:null},
  {id:"x8arx5y", platform:"Dailymotion", title:"Documents déclassifiés de Pfizer et revelations choc de Christine Cotton", author:"Sud Radio", url:"https://www.dailymotion.com/video/x8arx5y", thumb:null}
];

const grid = document.getElementById("grid");
const countEl = document.getElementById("count");
const emptyEl = document.getElementById("empty");
const searchEl = document.getElementById("search");

function esc(s){ return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function cardHTML(v){
  const thumb = v.thumb
    ? `<img class="thumb" src="${esc(v.thumb)}" alt="" loading="lazy">`
    : `<div class="thumb placeholder">No thumbnail</div>`;
  return `<article class="card">
    ${thumb}
    <div class="body">
      <span class="badge">${esc(v.platform)}</span>
      <div class="title">${esc(v.title)}</div>
      <div class="meta">${esc(v.author)}</div>
      <div class="transcript">Transcript: not yet generated</div>
      <a class="watch" href="${esc(v.url)}" target="_blank" rel="noopener">Watch &#9654;</a>
    </div>
  </article>`;
}

function render(list){
  grid.innerHTML = list.map(cardHTML).join("");
  emptyEl.hidden = list.length > 0;
  countEl.textContent = `${list.length} of ${videos.length} videos`;
}

searchEl.addEventListener("input", () => {
  const q = searchEl.value.trim().toLowerCase();
  const filtered = !q ? videos : videos.filter(v =>
    (v.title + " " + v.author + " " + v.platform).toLowerCase().includes(q));
  render(filtered);
});

render(videos);
</script>
</body>
</html>
